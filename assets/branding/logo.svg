<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="80" x2="944" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070F2A"/>
      <stop offset="1" stop-color="#1A2643"/>
    </linearGradient>
    <linearGradient id="stroke" x1="294" y1="206" x2="714" y2="616" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63B3FF"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="liquid" x1="270" y1="593" x2="754" y2="593" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1ED6B1"/>
      <stop offset="1" stop-color="#0DB57F"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="96" fill="url(#bg)"/>

  <!-- Base rings -->
  <ellipse cx="512" cy="705" rx="266" ry="58" fill="#0A132E" stroke="#5E7397" stroke-width="12" opacity="0.95"/>
  <path d="M246 705C246 769.617 365.517 822 512 822C658.483 822 778 769.617 778 705V706C778 770.617 658.483 823 512 823C365.517 823 246 770.617 246 706V705Z" fill="#0A132E" stroke="#4B5F85" stroke-width="10"/>
  <ellipse cx="512" cy="846" rx="260" ry="52" fill="#0B1632" stroke="#3A4E74" stroke-width="10" opacity="0.9"/>

  <!-- Liquid surface -->
  <ellipse cx="512" cy="626" rx="244" ry="42" fill="url(#liquid)"/>
  <ellipse cx="512" cy="626" rx="252" ry="48" fill="none" stroke="#6F87AC" stroke-width="10"/>

  <!-- Robot body -->
  <g filter="url(#shadow)">
    <rect x="374" y="278" width="276" height="286" rx="54" fill="#1F2B41" stroke="url(#stroke)" stroke-width="12"/>

    <!-- Head -->
    <rect x="420" y="190" width="184" height="132" rx="30" fill="#1D2A3F" stroke="#74B7FF" stroke-width="12"/>

    <!-- Antenna -->
    <line x1="512" y1="168" x2="512" y2="126" stroke="#7EBEFF" stroke-width="10" stroke-linecap="round"/>
    <circle cx="512" cy="112" r="20" fill="url(#stroke)"/>

    <!-- Eyes -->
    <circle cx="470" cy="255" r="20" fill="#38D9F3"/>
    <circle cx="554" cy="255" r="20" fill="#9555FF"/>

    <!-- Mouth -->
    <rect x="472" y="286" width="80" height="14" rx="7" fill="#42D4FF"/>
  </g>

  <!-- Robotic arm -->
  <g>
    <path d="M650 409L784 491" stroke="#90A4C1" stroke-width="20" stroke-linecap="round"/>
    <path d="M784 491L702 640" stroke="#90A4C1" stroke-width="20" stroke-linecap="round"/>
    <ellipse cx="660" cy="644" rx="34" ry="24" fill="#CFD8E3"/>
    <ellipse cx="660" cy="644" rx="34" ry="24" fill="none" stroke="#94A4BE" stroke-width="4"/>
  </g>

  <!-- Energy wisps -->
  <path d="M334 282C346 311 346 350 328 385C315 409 317 444 334 468" stroke="#44D8F5" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M692 280C676 312 676 354 695 388C709 413 706 447 686 469" stroke="#A99BFF" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Title -->
  <text x="512" y="925" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="1.2" fill="#D9E2EE">ALCHEMICAL ECOSYSTEM</text>
</svg>
