<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="geometricPrecision">

  <defs>

    <!-- ░░ FILTERS ░░ -->

    <!-- Purple outer-ring glow -->
    <filter id="f-ring-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Emerald center-point glow -->
    <filter id="f-center-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hexagon drop-shadow / depth -->
    <filter id="f-hex-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#4B0082" flood-opacity="0.7"/>
    </filter>

    <!-- Orbit-node soft glow -->
    <filter id="f-node-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ░░ GRADIENTS ░░ -->

    <!-- Hexagon face: gold → deep-purple diagonal -->
    <linearGradient id="g-hex-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>

    <!-- Hexagon inner radial overlay: emerald glow from center -->
    <radialGradient id="g-hex-inner" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#00FFAA" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#00FFAA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </radialGradient>

    <!-- Background vignette: slightly lighter obsidian towards center -->
    <radialGradient id="g-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#131318"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>

    <!-- ░░ CLIP PATH ░░ -->
    <clipPath id="clip-bg">
      <rect width="512" height="512" rx="80" ry="80"/>
    </clipPath>

  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!-- 1. BACKGROUND                              -->
  <!-- ══════════════════════════════════════════ -->
  <rect width="512" height="512" rx="80" ry="80" fill="#0A0A0A"/>
  <rect width="512" height="512" rx="80" ry="80" fill="url(#g-bg)"/>

  <!-- Clipping group keeps all art inside rounded rect -->
  <g clip-path="url(#clip-bg)">

    <!-- ══════════════════════════════════════════ -->
    <!-- 2. OUTER SCALE RING  r=230                 -->
    <!-- ══════════════════════════════════════════ -->
    <circle
      cx="256" cy="256" r="230"
      fill="none"
      stroke="#4B0082"
      stroke-width="14"
      stroke-dasharray="8 4"
      filter="url(#f-ring-glow)"
    />

    <!-- ══════════════════════════════════════════ -->
    <!-- 3. MIDDLE GOLD RING  r=190                 -->
    <!-- ══════════════════════════════════════════ -->
    <circle
      cx="256" cy="256" r="190"
      fill="none"
      stroke="#FFD700"
      stroke-width="2"
      stroke-opacity="0.3"
    />

    <!-- ══════════════════════════════════════════ -->
    <!-- 5a. SPOKE LINES center → orbit nodes       -->
    <!-- ══════════════════════════════════════════ -->
    <!--
      Orbit radius = 170, angles 0°, 60°, 120°, 180°, 240°, 300°
      cos/sin computed at these angles:
        0°   → (170, 0)     → (426, 256)
        60°  → (85, 147.2)  → (341, 403.2)
        120° → (-85, 147.2) → (171, 403.2)
        180° → (-170, 0)    → (86, 256)
        240° → (-85,-147.2) → (171, 108.8)
        300° → (85,-147.2)  → (341, 108.8)
    -->
    <g stroke="#ffffff" stroke-opacity="0.082" stroke-width="1" stroke-linecap="round">
      <line x1="256" y1="256" x2="426"   y2="256"/>
      <line x1="256" y1="256" x2="341"   y2="403.2"/>
      <line x1="256" y1="256" x2="171"   y2="403.2"/>
      <line x1="256" y1="256" x2="86"    y2="256"/>
      <line x1="256" y1="256" x2="171"   y2="108.8"/>
      <line x1="256" y1="256" x2="341"   y2="108.8"/>
    </g>

    <!-- ══════════════════════════════════════════ -->
    <!-- 4. CENTRAL HEXAGON  circumradius=110       -->
    <!-- ══════════════════════════════════════════ -->
    <!--
      Regular hexagon vertices (flat-top, circumradius=110):
      Angle offsets 30°,90°,150°,210°,270°,330° gives pointy-top orientation.
      pointy-top at 30° steps:
        30°  → (95.26,  55)   → (351.26, 201)
        90°  → (0,     110)   → (256,    366)
        150° → (-95.26, 55)   → (160.74, 311)  ← wait, let me redo properly.

      Flat-top hexagon (vertex at 0°,60°,…):
        0°   → (110, 0)    → (366,  256)
        60°  → (55,  95.26)→ (311,  351.26)
        120° → (-55, 95.26)→ (201,  351.26)
        180° → (-110,0)    → (146,  256)
        240° → (-55,-95.26)→ (201,  160.74)
        300° → (55,-95.26) → (311,  160.74)
    -->
    <polygon
      points="366,256 311,351.26 201,351.26 146,256 201,160.74 311,160.74"
      fill="url(#g-hex-face)"
      filter="url(#f-hex-shadow)"
    />
    <!-- Emerald radial overlay on hexagon -->
    <polygon
      points="366,256 311,351.26 201,351.26 146,256 201,160.74 311,160.74"
      fill="url(#g-hex-inner)"
    />
    <!-- Subtle hex border -->
    <polygon
      points="366,256 311,351.26 201,351.26 146,256 201,160.74 311,160.74"
      fill="none"
      stroke="#FFD700"
      stroke-width="1.5"
      stroke-opacity="0.5"
    />

    <!-- ══════════════════════════════════════════ -->
    <!-- 5b. ORBITING AGENT CIRCLES  r=18           -->
    <!-- Alternating fill: Gold, Emerald, Violet    -->
    <!-- ══════════════════════════════════════════ -->

    <!-- 0° → Gold -->
    <circle cx="426" cy="256"   r="18" fill="#FFD700" filter="url(#f-node-glow)"/>
    <circle cx="426" cy="256"   r="18" fill="#FFD700" fill-opacity="0.15" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- 60° → Emerald -->
    <circle cx="341" cy="403.2" r="18" fill="#00FFAA" filter="url(#f-node-glow)"/>
    <circle cx="341" cy="403.2" r="18" fill="#00FFAA" fill-opacity="0.15" stroke="#00FFAA" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- 120° → Violet -->
    <circle cx="171" cy="403.2" r="18" fill="#9D4EDD" filter="url(#f-node-glow)"/>
    <circle cx="171" cy="403.2" r="18" fill="#9D4EDD" fill-opacity="0.15" stroke="#9D4EDD" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- 180° → Gold -->
    <circle cx="86"  cy="256"   r="18" fill="#FFD700" filter="url(#f-node-glow)"/>
    <circle cx="86"  cy="256"   r="18" fill="#FFD700" fill-opacity="0.15" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- 240° → Emerald -->
    <circle cx="171" cy="108.8" r="18" fill="#00FFAA" filter="url(#f-node-glow)"/>
    <circle cx="171" cy="108.8" r="18" fill="#00FFAA" fill-opacity="0.15" stroke="#00FFAA" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- 300° → Violet -->
    <circle cx="341" cy="108.8" r="18" fill="#9D4EDD" filter="url(#f-node-glow)"/>
    <circle cx="341" cy="108.8" r="18" fill="#9D4EDD" fill-opacity="0.15" stroke="#9D4EDD" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- ══════════════════════════════════════════ -->
    <!-- 6. CENTER POINT  r=8 emerald               -->
    <!-- ══════════════════════════════════════════ -->
    <circle cx="256" cy="256" r="8" fill="#00FFAA" filter="url(#f-center-glow)"/>
    <!-- Hard crisp dot on top -->
    <circle cx="256" cy="256" r="5" fill="#00FFAA"/>

  </g><!-- end clip-path -->

</svg>
