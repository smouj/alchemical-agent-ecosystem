name: alchemical-ecosystem
# 🧪 Alchemical Ecosystem — Docker Compose (Simplificado v3)
# Arquitectura limpia: 5 servicios esenciales
# Eliminados: 10 microservicios stubs de agentes (ahora gestionados dinámicamente por gateway)

services:
  # ---------------------------------------------------------------------------
  # 🌐 Caddy - Reverse Proxy y TLS Automático
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.9-alpine
    container_name: alchemy-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [alchemical-net]
    depends_on:
      - alchemical-gateway
      - alchemical-dashboard
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # ⚡ Redis - Cache, Pub/Sub y Colas
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: alchemy-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-alchemical}
    volumes:
      - redis_data:/data
    networks: [alchemical-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-alchemical}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # 🔍 ChromaDB - Vector Store para Embeddings
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: alchemy-chromadb
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=${CHROMADB_ALLOW_RESET:-FALSE}
    volumes:
      - chroma_data:/chroma/chroma
    networks: [alchemical-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # 🏛️ Alchemical Gateway - API Principal y Orquestador
  # Gestiona agentes dinámicamente mediante SQLite (no requiere microservicios)
  # ---------------------------------------------------------------------------
  alchemical-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: alchemy-gateway
    restart: unless-stopped
    ports:
      - "7411:7411"
    environment:
      - ALCHEMICAL_GATEWAY_TOKEN=${ALCHEMICAL_GATEWAY_TOKEN}
      - KILO_API_KEY=${KILO_API_KEY:-}
      - KILO_BASE_URL=${KILO_BASE_URL:-https://api.kilo.ai/api/gateway}
      - KILO_DEFAULT_MODEL=${KILO_DEFAULT_MODEL:-anthropic/claude-sonnet-4.5}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-alchemical}
      - GATEWAY_SECRET=${GATEWAY_SECRET:-}
      - DATABASE_URL=/app/.runtime/gateway.db
    volumes:
      - ./.runtime:/app/.runtime
    networks: [alchemical-net]
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # 🎨 Alchemical Dashboard - UI Next.js
  # ---------------------------------------------------------------------------
  alchemical-dashboard:
    build:
      context: ./apps/alchemical-dashboard
      dockerfile: Dockerfile
    container_name: alchemy-dashboard
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://alchemical-gateway:7411
    networks: [alchemical-net]
    depends_on:
      alchemical-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/system"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  alchemical-net:
    name: alchemical-net
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
