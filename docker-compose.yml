name: alchemical-ecosystem
services:
  caddy:
    image: caddy:2.9
    container_name: alchemy-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - velktharion
      - synapsara
      - kryonexus
      - noctumbra-mail
      - temporaeth
      - vaeloryn-conclave
      - ignivox
      - auralith
      - resonvyr
      - fluxenrath
    networks: [alchemical-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-alchemical}
    volumes:
      - redis_data:/data
    networks: [alchemical-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-alchemical}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  chromadb:
    image: chromadb/chroma:0.5.5
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=${CHROMADB_ALLOW_RESET:-FALSE}
    volumes:
      - chroma_data:/chroma/chroma
    networks: [alchemical-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  alchemical-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    container_name: alchemical-gateway
    environment:
      - ALCHEMICAL_GATEWAY_TOKEN=${ALCHEMICAL_GATEWAY_TOKEN}
      - KILO_API_KEY=${KILO_API_KEY:-}
      - KILO_BASE_URL=${KILO_BASE_URL:-https://api.kilo.ai/api/gateway}
      - KILO_DEFAULT_MODEL=${KILO_DEFAULT_MODEL:-anthropic/claude-sonnet-4.5}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-alchemical}
      - GATEWAY_SECRET=${GATEWAY_SECRET:-}
    volumes:
      - ./.runtime:/app/.runtime
    networks: [alchemical-net]
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 128m

  velktharion:
    build: ./services/velktharion
    restart: unless-stopped
    environment:
      - SERVICE_NAME=velktharion
      - PORT=7401
      - KILO_API_KEY=${KILO_API_KEY:-}
      - KILO_BASE_URL=${KILO_BASE_URL:-https://api.kilo.ai/api/gateway}
      - KILO_DEFAULT_MODEL=${KILO_DEFAULT_MODEL:-anthropic/claude-sonnet-4.5}
      - GATEWAY_SECRET=${GATEWAY_SECRET:-}
    networks: [alchemical-net]
    depends_on:
      alchemical-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7401/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  synapsara:
    build: ./services/synapsara
    restart: unless-stopped
    environment:
      - SERVICE_NAME=synapsara
      - PORT=7402
      - KILO_API_KEY=${KILO_API_KEY:-}
