name: Sync Project Status

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate project status snapshot
        run: bash scripts/sync-project-state.sh

      - name: Commit status if changed
        run: |
          if git diff --quiet docs/PROJECT_STATUS.md; then
            echo "No status changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_STATUS.md
          git commit -m "docs(status): auto-sync project snapshot"
          git push
