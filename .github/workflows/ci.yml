name: CI
on:
  push:
    branches: [main, 'release/**', 'feat/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('gateway/requirements.txt') }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r gateway/requirements.txt pytest==8.3.0 pytest-asyncio==0.24.0 httpx==0.27.0
      - run: pip install ruff==0.8.0 && ruff check gateway/ shared/ --select E,W,F --ignore E501
      - run: pip install mypy==1.13.0 types-redis==4.6.0.20241004 && mypy gateway/app.py --ignore-missing-imports --no-strict-optional
      - run: python -m py_compile gateway/app.py
      - run: python -m py_compile services/temporaeth/app.py services/resonvyr/app.py services/kryonexus/app.py services/fluxenrath/app.py services/auralith/app.py services/synapsara/app.py services/noctumbra-mail/app.py
      - run: pytest -q tests/test_gateway_api.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('apps/alchemical-dashboard/package-lock.json') }}
      - run: cd apps/alchemical-dashboard && npm ci
      - run: cd apps/alchemical-dashboard && npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config > /tmp/compose.validated.yml

  scorecard:
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: ossf/scorecard-action@v2.3.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
