name: Release Notes
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate release summary
        run: |
          echo "# Release $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "Automated release notes placeholder." >> $GITHUB_STEP_SUMMARY
