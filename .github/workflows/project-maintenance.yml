name: Project Maintenance

on:
  schedule:
    - cron: "29 */8 * * *"
  workflow_dispatch:

jobs:
  project-sync-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Maintenance reminder
        run: |
          echo "Project automation requires gh auth with projects scope in a trusted environment." >> $GITHUB_STEP_SUMMARY
          echo "Run: bash ops/project-maintenance.sh" >> $GITHUB_STEP_SUMMARY
